# .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # 1. SonarQube Code Analysis Job
  sonarqube-check:
    runs-on: [self-hosted, Linux] # <-- UPDATED: Tells GitHub to run this on your KRONOS13 machine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # 2. Push/Deploy Job: Runs ONLY on main branch pushes
  docker-deploy:
    needs: sonarqube-check 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux] # <-- UPDATED: Also runs the docker deployment locally on your machine
    environment: production  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push via Composite Action
        uses: ./.github/actions/docker-build-push
        with:
          docker_username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker_password: ${{ secrets.DOCKERHUB_TOKEN }}
          image_name: 'my-first-repo'
          image_tag: ${{ github.sha }}
