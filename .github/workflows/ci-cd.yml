name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature" ]
  pull_request:
    branches: [ "main" ]

jobs:
  sonarqube-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # Add your language setup steps here if needed (e.g., setup-java or setup-node)

      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # If using Maven/Gradle instead of the standalone scanner, use your build command here:
        # run: mvn clean verify sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # STEP TO EXPORT AND VIEW REPORT: Uploading scan results as an artifact
      - name: Upload SonarQube Report Artifact
        uses: actions/upload-artifact@v4
        if: always() # Ensures the report is uploaded even if the analysis fails
        with:
          name: sonarqube-report
          path: .scannerwork/report-task.txt # Path to the local scanner summary file

  docker-deploy:
    runs-on: ubuntu-latest
    needs: sonarqube-check # <-- This makes SonarQube MANDATORY. If SonarQube fails, this job will not run.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Your existing Docker Build and Deploy steps go here
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      # - name: Build and Push Docker image...
