# .github/workflows/ci-cd.yml
name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # 1. SonarQube Code Analysis Job
  # 1. SonarQube Code Analysis Job
  sonarqube-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # FIX: Using the official, updated SonarSource action to avoid the vulnerability error
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Required if using self-hosted SonarQubeep this if using your own SonarQube server; remove if using SonarCloud

      # Checks the status of the quality gate
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 2. Push/Deploy Job: Runs ONLY on main branch pushes and waits for Environment Approval
  docker-deploy:
    needs: sonarqube-check # Ensures deployment only happens if the scan passes!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push via Composite Action
        uses: ./.github/actions/docker-build-push
        with:
          docker_username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker_password: ${{ secrets.DOCKERHUB_TOKEN }}
          image_name: 'my-first-repo'
          image_tag: ${{ github.sha }}
